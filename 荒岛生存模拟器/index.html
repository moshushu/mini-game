<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荒岛生存模拟器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 角色创建界面 -->
    <div id="character-creation" class="character-creation">
        <div class="creation-content">
            <h1>🏝️ 荒岛生存模拟器</h1>
            <h2>创建你的角色</h2>
            
            <div class="form-group">
                <label for="player-name">角色名称：</label>
                <input type="text" id="player-name" placeholder="请输入你的名字" maxlength="10">
            </div>
            
            <div class="form-group">
                <label>选择性别：</label>
                <div class="gender-selection">
                    <label class="gender-option">
                        <input type="radio" name="gender" value="female" checked>
                        <span class="gender-btn">♀️ 女性</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="male">
                        <span class="gender-btn">♂️ 男性</span>
                    </label>
                    <label class="gender-option">
                        <input type="radio" name="gender" value="other">
                        <span class="gender-btn">⚧ 双性</span>
                    </label>
                </div>
            </div>
            
            <button id="start-game-btn" class="start-btn">开始游戏</button>
        </div>
    </div>

    <div id="game-container" class="hidden">
        <main id="game-body">
            <!-- 左侧：角色信息与状态栏 -->
            <aside id="character-panel">
                <div id="character-info">
                    <div id="character-name-row">
                        <span id="character-gender-icon">⚧</span>
                        <span id="character-name">幸存者</span>
                    </div>
                </div>
                <div id="status-list">
                    <div class="status-row" data-tooltip="生命值：代表你的健康程度。归零时游戏结束。可以通过吃饱喝足缓慢恢复。">
                        <span class="status-icon">❤️</span>
                        <div class="status-bar-wrap">
                            <div class="status-bar-small">
                                <div id="health-bar-small" class="fill" style="width: 100%;"></div>
                            </div>
                            <span class="status-text">生命值</span>
                        </div>
                    </div>
                    <div class="status-row" data-tooltip="饱食度：随时间流逝。过低会扣除生命。通过搜寻食物并食用恢复。">
                        <span class="status-icon">🍖</span>
                        <div class="status-bar-wrap">
                            <div class="status-bar-small">
                                <div id="hunger-bar-small" class="fill" style="width: 100%;"></div>
                            </div>
                            <span class="status-text">饱食度</span>
                        </div>
                    </div>
                    <div class="status-row" data-tooltip="水分：消耗速度比饱食度快。过低会扣除生命。通过寻找淡水恢复。">
                        <span class="status-icon">💧</span>
                        <div class="status-bar-wrap">
                            <div class="status-bar-small">
                                <div id="thirst-bar-small" class="fill" style="width: 100%;"></div>
                            </div>
                            <span class="status-text">水分</span>
                        </div>
                    </div>
                    <div class="status-row" data-tooltip="精力：进行任何活动都会消耗。通过休息或睡觉恢复。">
                        <span class="status-icon">⚡</span>
                        <div class="status-bar-wrap">
                            <div class="status-bar-small">
                                <div id="energy-bar-small" class="fill" style="width: 100%;"></div>
                            </div>
                            <span class="status-text">精力</span>
                        </div>
                    </div>
                </div>
                <!-- 背包按钮 -->
                <div id="inventory-btn-container">
                    <button id="inventory-btn" onclick="game.showInventory()" title="打开背包">
                        <span class="inventory-icon">🎒</span>
                        <span class="inventory-label">背包</span>
                    </button>
                </div>
            </aside>

            <!-- 中间：环境插图与日志 -->
            <section id="display-area">
                <div id="environment-view">
                    <div id="game-clock">06:00</div>
                    <div id="scene-icon">🏝️</div>
                    <div id="scene-name">海滩</div>
                    <div id="building-display"></div>
                    <div id="time-info">第 1 天 | 白天</div>
                    <div id="top-right-controls">
                        <button id="pause-btn" onclick="game.togglePause()">⏸️</button>
                        <button id="restart-btn" onclick="game.restart()">🔄</button>
                    </div>
                </div>
                <div id="log-container">
                    <ul id="game-log">
                        <li>你在一场海难中幸存，漂流到了这座荒岛...</li>
                    </ul>
                </div>
            </section>


        </main>

        <!-- 底部动作面板 -->
        <footer id="action-panel">
            <div class="action-group">
                <button onclick="game.collect('wood')">🪵 砍树</button>
                <button onclick="game.collect('stone')">🪨 采石</button>
                <button onclick="game.explore()">🧭 探索</button>
            </div>

            <div class="action-group">
                <button onclick="game.showCrafting()">🛠️ 制作</button>
                <button onclick="game.showBuilding()">🏗️ 建造</button>
                <button onclick="game.rest('nap')">🧘 小憩</button>
                <button onclick="game.rest('sleep')">😴 睡觉</button>
            </div>
            <!-- 测试按钮：测试流星事件 -->
            <div class="action-group test-group">
                <button onclick="game.testMeteorShower()" class="test-btn">🌠 测试流星</button>
            </div>
        </footer>

        <!-- 模态框：探索选择 -->
        <div id="explore-modal" class="modal hidden">
            <div class="modal-content explore-modal-content">
                <span class="close-btn" onclick="game.hideExplore()">&times;</span>
                <h2>🧭 选择探索地点</h2>
                <div id="explore-list">
                    <!-- 探索地点将通过 JS 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 模态框：背包 -->
        <div id="inventory-modal" class="modal hidden">
            <div class="modal-content inventory-modal-content">
                <span class="close-btn" onclick="game.hideInventory()">&times;</span>
                <h2>🎒 背包</h2>
                <div id="inventory-grid">
                    <!-- 物品将通过 JS 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 模态框：建造营地 -->
        <div id="building-modal" class="modal hidden">
            <div class="modal-content building-modal-content">
                <span class="close-btn" onclick="game.hideBuilding()">&times;</span>
                <h2>🏗️ 建造营地</h2>
                <div id="current-building"></div>
                <div id="building-list">
                    <!-- 建筑项将通过 JS 动态生成 -->
                </div>
            </div>
        </div>

        <!-- 模态框：制作列表 -->
        <div id="crafting-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" onclick="game.hideCrafting()">&times;</span>
                <h2>🛠️ 制作工具</h2>
                <div id="crafting-list">
                    <!-- 制作项将通过 JS 动态生成 -->
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
